name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: banking
          POSTGRES_USER: bank_user
          POSTGRES_PASSWORD: bank_pass
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bank_user -d banking"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
      kafka:
        image: bitnami/kafka:latest
        ports:
          - 9092:9092
        options: >-
          --health-cmd "bash -c 'echo > /dev/tcp/localhost/9092 || exit 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build and test
        run: mvn -B clean verify
        env:
          DB_URL: jdbc:postgresql://localhost:5432/banking
          DB_USERNAME: bank_user
          DB_PASSWORD: bank_pass
          REDIS_HOST: localhost
          REDIS_PORT: 6379
      - name: Build Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: false
          tags: enterprise-banking-platform:ci-latest
